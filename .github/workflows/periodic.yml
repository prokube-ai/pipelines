name: Periodic Functional Tests

on:
  schedule:
    - cron: '0 0 * * *' # Run every day at midnight

jobs:
  run_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Create k8s Kind Cluster
        uses: container-tools/kind-action@v2
        with:
          cluster_name: kfp-functional-test
          kubectl_version: v1.29.2
          version: v0.22.0
          node_image: kindest/node:v1.29.2
      - name: Deploy kfp
        run: |
          export PIPELINE_VERSION=2.2.0
          kubectl apply -k "github.com/kubeflow/pipelines/manifests/kustomize/cluster-scoped-resources?ref=$PIPELINE_VERSION"
          kubectl wait --for condition=established --timeout=60s crd/applications.app.k8s.io
          kubectl apply -k "github.com/kubeflow/pipelines/manifests/kustomize/env/dev?ref=$PIPELINE_VERSION"
          echo "Waiting for max 300s for kfp cluster to come up"
          kubectl wait --for=condition=Ready pods --all -n kubeflow --timeout=300s
      - name: Port forward kfp apiserver
        run: |
          nohup kubectl port-forward --namespace kubeflow svc/ml-pipeline 8888:8888 &
      - name: Run Functional Tests
        run: |
          log_dir=$(mktemp -d)
          ./test/kfp-functional-test/kfp-functional-test.sh > $log_dir/periodic_tests.txt
      - name: Collect test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: periodic-functional-artifacts
          path: /tmp/tmp.*/*
